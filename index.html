<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo_500X500.png">
    <title>듣다 | Make your own Topster</title>
</head>
<body>
    <main>
        <div class="chart-builder">
            <div id="chart" class="grid-container">
            </div>
        </div>
        <div class="sidebar-container">
            <div class="sidebar-container-navbar"> 
                <form action="#" class="search-form" autocomplete="off">
                    <input type="search" id="album-search" placeholder="추가할 앨범명 입력">
                    <button type="submit" class="add-to-chart-button">앨범 추가</button>
                </form>
                
                <button class="download-button">다운로드</button>
                <button class="share-button">공유</button>

                <button class="resize-button three-by-three">3X3</button>
                <button class="resize-button four-by-four">4X4</button>
                <button class="resize-button five=by-five">5X5</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
