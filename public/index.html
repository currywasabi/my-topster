<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/style.css">
    <link rel="icon" href="image/logo_500X500.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>듣다 | Make your own Topster</title>
</head>
<body>
    <main>
        <div class="grid-wrapper">
            <div class="grid"></div>
        </div>

        <div class="sidebar-container">
            <div class="search-bar">
                <input type="search" class="search-bar__input" placeholder="  추가할 앨범의 제목 또는 아티스트 이름 입력">
                <button class="search-bar__btn--search">
                    <i class="material-icons">search</i>
                </button>
            </div>
        </div>

        <div class="floating-controls">
            <button class="floating-controls__btn--download">
                    <i class="material-icons">download</i>
            </button>
            <div class="floating-controls__grid-sizer">
                <!-- 기능 없음 -->
                <button class="floating-controls__btn--menu">
                    <i class="material-icons">menu</i>
                </button>
                
                <div class="floating-controls__col-sizer">
                    <button class="floating-controls__btn--sizer" data-axis="cols" data-dir="1">
                        <i class="material-icons">add</i>
                    </button>
                    <p>가로</p>
                    <div class="floating-controls__output--cols"></div>
                    <button class="floating-controls__btn--sizer" data-axis="cols" data-dir="-1">
                        <i class="material-icons">remove</i>
                    </button>
                </div>
                <div class="floating-controls__row-sizer">
                    <button class="floating-controls__btn--sizer" data-axis="rows" data-dir="1">
                        <i class="material-icons">add</i>
                    </button>
                    <p>세로</p>
                    <div class="floating-controls__output--rows"></div>
                    <button class="floating-controls__btn--sizer" data-axis="rows" data-dir="-1">
                        <i class="material-icons">remove</i>
                    </button>
                </div>
            </div>
        </div>

        <div class="results-container">
            <button class="results-container__delete-btn">✕</button>
            <div class="results"></div>
        </div>
    </main>

    <script type="module" src="../src/main.js"></script>
</body>
</html>
